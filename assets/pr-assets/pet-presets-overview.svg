<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="32" y="32" width="1136" height="611" rx="24" fill="#ffffff" stroke="#d8dee9"/>
  <text x="72" y="88" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#101828">Alook PET Presets</text>
  <text x="72" y="124" font-family="Inter, Arial, sans-serif" font-size="18" fill="#667085">30 selectable pixel companions, opt-in from Settings &gt; Pet</text>
  <g transform="translate(74 160)">
    <rect width="210" height="92" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="22" y="39" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#c2410c">30</text>
    <text x="74" y="34" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#7c2d12">character presets</text>
    <text x="74" y="56" font-family="Inter, Arial, sans-serif" font-size="13" fill="#9a3412">generic public names</text>
  </g>
  <g transform="translate(312 160)">
    <rect width="210" height="92" rx="14" fill="#ecfdf3" stroke="#bbf7d0"/>
    <text x="22" y="39" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#15803d">0</text>
    <text x="74" y="34" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#14532d">runtime assets</text>
    <text x="74" y="56" font-family="Inter, Arial, sans-serif" font-size="13" fill="#166534">drawn as SVG pixels</text>
  </g>
  <g transform="translate(550 160)">
    <rect width="250" height="92" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="22" y="39" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#1d4ed8">1</text>
    <text x="74" y="34" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">default preset</text>
    <text x="74" y="56" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1d4ed8">Claude Pixel first</text>
  </g>
  <g transform="translate(828 160)">
    <rect width="266" height="92" rx="14" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="22" y="39" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#6d28d9">opt-in</text>
    <text x="22" y="62" font-family="Inter, Arial, sans-serif" font-size="13" fill="#6d28d9">disabled until the user enables it</text>
  </g>
  <g transform="translate(72 292)" font-family="Inter, Arial, sans-serif">
    <defs>
      <g id="petIcon">
        <rect x="15" y="12" width="50" height="50" rx="10" fill="var(--body)"/>
        <rect x="23" y="22" width="10" height="10" rx="2" fill="#111827"/>
        <rect x="47" y="22" width="10" height="10" rx="2" fill="#111827"/>
        <rect x="31" y="44" width="18" height="5" rx="2.5" fill="#ffffff" opacity=".72"/>
        <rect x="10" y="64" width="18" height="8" rx="4" fill="var(--accent)"/>
        <rect x="52" y="64" width="18" height="8" rx="4" fill="var(--accent)"/>
      </g>
    </defs>
    <g transform="translate(0 0)" style="--body:#d87352;--accent:#f1bc62"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Claude Pixel</text></g>
    <g transform="translate(170 0)" style="--body:#2f8fc4;--accent:#f4c94f"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Pocket Bell</text></g>
    <g transform="translate(340 0)" style="--body:#e6bd37;--accent:#df5145"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Spark Bolt</text></g>
    <g transform="translate(510 0)" style="--body:#df7fa0;--accent:#f0d862"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Star Puff</text></g>
    <g transform="translate(680 0)" style="--body:#5f9666;--accent:#d6e78a"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Leaf Bud</text></g>
    <g transform="translate(850 0)" style="--body:#ce6b3f;--accent:#f3c34b"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Tiny Flame</text></g>
    <g transform="translate(0 110)" style="--body:#629dcc;--accent:#ead59a"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Shell Fin</text></g>
    <g transform="translate(170 110)" style="--body:#c65342;--accent:#e8c866"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Straw Voyager</text></g>
    <g transform="translate(340 110)" style="--body:#554761;--accent:#cf6f8e"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Imp Hood</text></g>
    <g transform="translate(510 110)" style="--body:#74766a;--accent:#c6d68c"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Forest Neighbor</text></g>
    <g transform="translate(680 110)" style="--body:#25262c;--accent:#f0f0d8"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Dust Puff</text></g>
    <g transform="translate(850 110)" style="--body:#5aa0d8;--accent:#f3f7ff"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Teardrop Slime</text></g>
    <g transform="translate(0 220)" style="--body:#54afa2;--accent:#e4f2ef"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Ink Runner</text></g>
    <g transform="translate(170 220)" style="--body:#6e91c8;--accent:#f3edf5"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Little Beagle</text></g>
    <g transform="translate(340 220)" style="--body:#df84b2;--accent:#f0d66a"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Tiny Antler</text></g>
    <g transform="translate(510 220)" style="--body:#bdc3ce;--accent:#f0c748"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Mecha Guard</text></g>
    <g transform="translate(680 220)" style="--body:#e681a4;--accent:#f3d66b"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Cozy Hood</text></g>
    <g transform="translate(850 220)" style="--body:#e5ba2f;--accent:#f2845f"><use href="#petIcon"/><text x="40" y="94" text-anchor="middle" font-size="11" fill="#344054">Arcade Chomp</text></g>
