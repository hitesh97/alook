<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#101828"/>
  <rect x="34" y="34" width="1132" height="607" rx="26" fill="#172033" stroke="#344054"/>
  <text x="76" y="90" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#f9fafb">Alook PET Interaction Model</text>
  <text x="76" y="126" font-family="Inter, Arial, sans-serif" font-size="18" fill="#cbd5e1">Opt-in companion with activity, movement, reaction, and notification states</text>
  <g transform="translate(76 165)" font-family="Inter, Arial, sans-serif">
    <rect width="318" height="118" rx="18" fill="#1f2937" stroke="#475467"/>
    <circle cx="54" cy="58" r="30" fill="#12b76a"/>
    <text x="54" y="66" text-anchor="middle" font-size="28" font-weight="700" fill="#052e16">0</text>
    <text x="104" y="50" font-size="19" font-weight="700" fill="#f9fafb">Default state</text>
    <text x="104" y="76" font-size="14" fill="#cbd5e1">Off until users opt in</text>
  </g>
  <g transform="translate(440 165)" font-family="Inter, Arial, sans-serif">
    <rect width="318" height="118" rx="18" fill="#1f2937" stroke="#475467"/>
    <circle cx="54" cy="58" r="30" fill="#60a5fa"/>
    <text x="54" y="66" text-anchor="middle" font-size="28" font-weight="700" fill="#082f49">6</text>
    <text x="104" y="50" font-size="19" font-weight="700" fill="#f9fafb">Away activities</text>
    <text x="104" y="76" font-size="14" fill="#cbd5e1">Coding, sleeping, reading, phone, thinking, snacking</text>
  </g>
  <g transform="translate(804 165)" font-family="Inter, Arial, sans-serif">
    <rect width="318" height="118" rx="18" fill="#1f2937" stroke="#475467"/>
    <circle cx="54" cy="58" r="30" fill="#f59e0b"/>
    <text x="54" y="66" text-anchor="middle" font-size="22" font-weight="700" fill="#451a03">2</text>
    <text x="104" y="50" font-size="19" font-weight="700" fill="#f9fafb">Display scopes</text>
    <text x="104" y="76" font-size="14" fill="#cbd5e1">Homepage canvas or global workspace layer</text>
  </g>
  <g transform="translate(80 335)" font-family="Inter, Arial, sans-serif">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
      </marker>
      <g id="miniPet">
        <rect x="22" y="12" width="60" height="58" rx="13" fill="#d87352"/>
        <rect x="34" y="28" width="11" height="12" rx="2" fill="#111827"/>
        <rect x="60" y="28" width="11" height="12" rx="2" fill="#111827"/>
        <rect x="42" y="50" width="22" height="5" rx="2.5" fill="#fff7ed" opacity=".8"/>
        <rect x="12" y="72" width="26" height="9" rx="4.5" fill="#f1bc62"/>
        <rect x="66" y="72" width="26" height="9" rx="4.5" fill="#f1bc62"/>
      </g>
    </defs>
    <g transform="translate(0 0)">
      <rect width="185" height="195" rx="20" fill="#111827" stroke="#334155"/>
      <use href="#miniPet" transform="translate(42 24)"/>
      <text x="92" y="134" text-anchor="middle" font-size="18" font-weight="700" fill="#f9fafb">Drag</text>
      <text x="92" y="158" text-anchor="middle" font-size="13" fill="#cbd5e1">clamped movement + footsteps</text>
    </g>
    <line x1="205" y1="98" x2="280" y2="98" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(300 0)">
      <rect width="185" height="195" rx="20" fill="#111827" stroke="#334155"/>
      <use href="#miniPet" transform="translate(42 24)"/>
      <path d="M34 30 L18 20 M112 30 L130 18 M42 15 L34 2 M102 70 L124 83" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>
      <text x="92" y="134" text-anchor="middle" font-size="18" font-weight="700" fill="#f9fafb">Click</text>
      <text x="92" y="158" text-anchor="middle" font-size="13" fill="#cbd5e1">shock reaction</text>
    </g>
    <line x1="505" y1="98" x2="580" y2="98" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(600 0)">
      <rect width="185" height="195" rx="20" fill="#111827" stroke="#334155"/>
      <use href="#miniPet" transform="translate(42 24) rotate(10 52 46)"/>
      <path d="M25 42 C5 20 18 8 38 20 M132 42 C152 20 139 8 119 20" stroke="#fb7185" stroke-width="5" fill="none" stroke-linecap="round"/>
      <text x="92" y="134" text-anchor="middle" font-size="18" font-weight="700" fill="#f9fafb">Shake</text>
      <text x="92" y="158" text-anchor="middle" font-size="13" fill="#cbd5e1">violent drag can faint</text>
    </g>
    <line x1="805" y1="98" x2="880" y2="98" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(900 0)">
      <rect width="185" height="195" rx="20" fill="#111827" stroke="#334155"/>
      <rect x="50" y="22" width="86" height="54" rx="11" fill="#334155"/>
      <use href="#miniPet" transform="translate(42 58) scale(.9)"/>
      <circle cx="132" cy="36" r="16" fill="#f97316"/>
      <text x="132" y="42" text-anchor="middle" font-size="15" font-weight="700" fill="#fff7ed">!</text>
      <text x="92" y="134" text-anchor="middle" font-size="18" font-weight="700" fill="#f9fafb">Peek + notify</text>
      <text x="92" y="158" text-anchor="middle" font-size="13" fill="#cbd5e1">agent nodes and inbox events</text>
    </g>
