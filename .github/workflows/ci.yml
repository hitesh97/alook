name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit -p src/web/tsconfig.json
      - run: pnpm tsc -b src/shared
      - run: pnpm tsc --noEmit -p src/cli/tsconfig.json
      - run: cd src/web && pnpm eslint

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: alook
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm vitest run
      - name: Create test database and push schema
        env:
          PGUSER: postgres
          PGPASSWORD: postgres
          PGHOST: localhost
          PGPORT: "5432"
        run: |
          psql "postgres://postgres:postgres@localhost:5432/postgres" -c "CREATE DATABASE alook_test;"
          cd src/web && DATABASE_URL="postgres://postgres:postgres@localhost:5432/alook_test?sslmode=disable" pnpm drizzle-kit push --force
      - name: Integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/alook_test?sslmode=disable
        run: pnpm vitest run --config vitest.integration.config.ts

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd src/web && pnpm build
      - run: cd src/cli && pnpm build
